spring.application.name=theater-reservation

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration 

spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://localhost:3306/mydatabase
spring.datasource.username=myuser
spring.datasource.password=secret
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql: true

rate.limit.requests=5
rate.limit.seconds=30

spring.security.user.name=1234
spring.security.user.password=1234

spring.security.oauth2.resourceserver.jwt.secret-key=my-secret-key

server.port=8443
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=147123
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=mycert