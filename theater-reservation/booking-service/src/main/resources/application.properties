spring.application.name=booking.service
server.port=${SERVER_PORT:8084}

spring.r2dbc.url=r2dbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3310}/bookingdb
spring.r2dbc.username=user
spring.r2dbc.password=secret

# Optional: Initialize schema on startup for development
spring.r2dbc.generate-unique-name=false
spring.r2dbc.initialization-mode=always
spring.r2dbc.schema=classpath:schema.sql
spring.sql.init.mode=always

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=user
spring.rabbitmq.password=password