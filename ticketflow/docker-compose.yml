# docker-compose.yml
services:
  mysql:
    image: mysql:8.4
    container_name: ticketflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ticketflow
      MYSQL_USER: ticketflow
      MYSQL_PASSWORD: ticketflow
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql-data: