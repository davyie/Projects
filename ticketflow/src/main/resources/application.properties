spring.application.name=ticketflow

# Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/ticketflow?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=ticketflow
spring.datasource.password=ticketflow
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.connection-init-sql=SET SESSION TRANSACTION ISOLATION LEVEL READ COMMITTED

# Flyway
spring.flyway.locations=classpath:db